name: ✅ Vérification du Code

# ─────────────────────────────────────────────────────────
# Ce workflow vérifie automatiquement ton code à chaque push
# ou pull request sur les branches main et develop.
#
# Il exécute 3 vérifications en parallèle :
#   1. Lint (Biome) + Types (TypeScript)
#   2. Tests (Jest - server)
#   3. Build (client React/Vite + server TypeScript)
# ─────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:

  # ─────────────────────────────────────────────
  # JOB 1 : Lint + vérification des types
  # ─────────────────────────────────────────────
  lint-and-types:
    name: 🔍 Lint & Types
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Récupérer le code
        uses: actions/checkout@v4

      - name: 🟢 Installer Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Installer les dépendances
        run: npm install

      - name: 🔍 Vérifier le formatage avec Biome
        run: npx biome check --error-on-warnings --no-errors-on-unmatched .

      - name: 🔷 Vérifier les types TypeScript (client)
        run: npm run check-types --workspace=client

      - name: 🔷 Vérifier les types TypeScript (server)
        run: npm run check-types --workspace=server

  # ─────────────────────────────────────────────
  # JOB 2 : Tests automatisés
  # ─────────────────────────────────────────────
  tests:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    needs: lint-and-types  # Attend que le job précédent soit OK

    steps:
      - name: 📥 Récupérer le code
        uses: actions/checkout@v4

      - name: 🟢 Installer Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Installer les dépendances
        run: npm install

      - name: 🧪 Lancer les tests (server)
        run: npm run test --workspace=server

  # ─────────────────────────────────────────────
  # JOB 3 : Vérifier que le build fonctionne
  # ─────────────────────────────────────────────
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: lint-and-types  # Attend que le job précédent soit OK

    steps:
      - name: 📥 Récupérer le code
        uses: actions/checkout@v4

      - name: 🟢 Installer Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Installer les dépendances
        run: npm install

      - name: 🏗️ Builder le client (React + Vite)
        run: npm run build --workspace=client

      - name: 🏗️ Builder le serveur (TypeScript)
        run: npm run build --workspace=server
