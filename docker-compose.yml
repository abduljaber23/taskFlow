services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    ports:
      - 3000:3000
    volumes:
      - ./client:/client
      - /client/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    depends_on:
      - server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    ports:
      - 3310:3310
    volumes:
      - ./server:/server
      - /server/node_modules
    env_file:
      - ./server/.env
    command: sh -c "npm run db:migrate && npm run dev"
    depends_on:
      database:
        condition: service_healthy
  database:
    image: mysql/mysql-server:8.0
    ports:
      - 3306:3306
    env_file:
      - ./server/.env
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin" ,"ping", "-h", "localhost", "-uuser", "-ppassword" ]
      interval: 5s 
      timeout: 5s 
      retries: 20 
      start_period: 10s

  
  adminer:
    image: adminer
    ports:
      - 8080:8080
    depends_on:
      database:
        condition: service_healthy

volumes:
  db-data: